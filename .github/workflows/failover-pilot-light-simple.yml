# =============================================================================
# Failover Pilot Light - Versión simplificada
# =============================================================================
# Despliega VM con IP pública + Azure DB, restaura backup y arranca la app.
#
# Flujo:
#   1. terraform apply → VM + Azure DB
#   2. Esperar a que la VM esté lista
#   3. Descargar dump desde S3
#   4. Copiar dump a la VM
#   5. Restaurar en Azure DB
#   6. Copiar código de la app a la VM
#   7. Construir y arrancar contenedor Docker
#   8. Health check
# =============================================================================

name: Failover Pilot Light

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_DIR: terraform/azure-pilot
  S3_BUCKET: tfg-gym-backups

jobs:
  failover:
    name: Desplegar pilot light en Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS (backend S3 y descarga de dump)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      # =================================================================
      # FASE 1: Desplegar infraestructura Azure
      # =================================================================

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="vm_admin_password=${{ secrets.VM_ADMIN_PASSWORD }}"

      - name: Leer outputs de Terraform
        id: outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "vm_ip=$(terraform output -raw vm_public_ip)" >> "$GITHUB_OUTPUT"
          echo "mysql_fqdn=$(terraform output -raw mysql_fqdn)" >> "$GITHUB_OUTPUT"

      - name: Instalar sshpass
        run: sudo apt-get install -y -qq sshpass

      # =================================================================
      # FASE 2: Esperar a que la VM esté lista
      # =================================================================

      - name: Esperar a que la VM esté lista
        run: |
          VM_IP="${{ steps.outputs.outputs.vm_ip }}"
          echo "Esperando a que la VM termine cloud-init..."
          for i in $(seq 1 40); do
            if sshpass -p "${{ secrets.VM_ADMIN_PASSWORD }}" \
              ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              azureuser@${VM_IP} "test -f /tmp/vm-ready" 2>/dev/null; then
              echo "VM lista"
              break
            fi
            echo "  Intento ${i}/40..."
            sleep 15
          done

      # =================================================================
      # FASE 3: Descargar dump desde S3 y restaurar
      # =================================================================

      - name: Descargar último dump desde S3
        run: |
          echo "Descargando dump desde s3://${{ env.S3_BUCKET }}/dumps/latest.sql"
          aws s3 cp s3://${{ env.S3_BUCKET }}/dumps/latest.sql /tmp/latest.sql
          ls -lh /tmp/latest.sql

      - name: Copiar dump a la VM
        run: |
          VM_IP="${{ steps.outputs.outputs.vm_ip }}"
          sshpass -p "${{ secrets.VM_ADMIN_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no \
            /tmp/latest.sql azureuser@${VM_IP}:/tmp/latest.sql

      - name: Restaurar dump en Azure DB
        run: |
          VM_IP="${{ steps.outputs.outputs.vm_ip }}"
          MYSQL_HOST="${{ steps.outputs.outputs.mysql_fqdn }}"

          sshpass -p "${{ secrets.VM_ADMIN_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no azureuser@${VM_IP} bash <<'ENDSSH'
          
          MYSQL_HOST="${{ steps.outputs.outputs.mysql_fqdn }}"
          
          echo "Esperando a que Azure DB sea accesible..."
          for i in $(seq 1 30); do
            if mysql -h ${MYSQL_HOST} -u admin_tfg -p"${{ secrets.DB_PASSWORD }}" -e "SELECT 1;" 2>/dev/null; then
              echo "Azure DB accesible"
              break
            fi
            echo "  Intento $i/30..."
            sleep 15
          done
          
          echo "Restaurando dump en Azure DB..."
          mysql -h ${MYSQL_HOST} -u admin_tfg -p"${{ secrets.DB_PASSWORD }}" gym < /tmp/latest.sql
          
          echo "=== Tablas restauradas ==="
          mysql -h ${MYSQL_HOST} -u admin_tfg -p"${{ secrets.DB_PASSWORD }}" -e "USE gym; SHOW TABLES;"
          
          rm -f /tmp/latest.sql
          ENDSSH

      # =================================================================
      # FASE 4: Copiar app y arrancar contenedor
      # =================================================================

      - name: Copiar app a la VM
        run: |
          VM_IP="${{ steps.outputs.outputs.vm_ip }}"
          sshpass -p "${{ secrets.VM_ADMIN_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no -r \
            app/web-form azureuser@${VM_IP}:/home/azureuser/

      - name: Construir y arrancar contenedor Docker
        run: |
          VM_IP="${{ steps.outputs.outputs.vm_ip }}"
          MYSQL_HOST="${{ steps.outputs.outputs.mysql_fqdn }}"

          sshpass -p "${{ secrets.VM_ADMIN_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no azureuser@${VM_IP} bash <<'ENDSSH'
          
          MYSQL_HOST="${{ steps.outputs.outputs.mysql_fqdn }}"
          
          cd /home/azureuser/web-form
          
          echo "Construyendo imagen Docker..."
          sudo docker build -t tfg-gym-app .
          
          echo "Limpiando contenedor anterior si existe..."
          sudo docker rm -f gym-app 2>/dev/null || true
          
          echo "Arrancando contenedor..."
          sudo docker run -d \
            --name gym-app \
            --restart unless-stopped \
            -p 80:80 \
            -e DB_HOST="${MYSQL_HOST}" \
            -e DB_USER="admin_tfg" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e DB_NAME="gym" \
            -e DB_PORT="3306" \
            tfg-gym-app
          
          echo "=== Contenedor corriendo ==="
          sudo docker ps
          
          echo "=== Logs del contenedor ==="
          sudo docker logs gym-app
          ENDSSH

      # =================================================================
      # FASE 5: Verificación
      # =================================================================

      - name: Health check de la aplicación
        run: |
          VM_IP="${{ steps.outputs.outputs.vm_ip }}"
          echo "Esperando 30s para que el contenedor arranque..."
          sleep 30

          HEALTH=$(curl -sk https://${VM_IP}/health.php 2>/dev/null || echo '{"status":"error"}')
          echo "Respuesta: $HEALTH"

          if echo "$HEALTH" | grep -q '"status"'; then
            echo ""
            echo "============================================"
            echo "FAILOVER COMPLETADO CON ÉXITO"
            echo "============================================"
            echo "URL:      https://${VM_IP}"
            echo "Health:   https://${VM_IP}/health.php"
            echo "Azure DB: ${{ steps.outputs.outputs.mysql_fqdn }}"
            echo ""
            echo "Para volver a AWS (failback) ejecutar:"
            echo "  Workflow 'Destroy Pilot Light'"
            echo "============================================"
          else
            echo "ERROR: el health check falló"
            exit 1
          fi
