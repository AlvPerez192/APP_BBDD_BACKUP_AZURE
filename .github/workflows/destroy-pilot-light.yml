# =============================================================================
# Destroy Pilot Light - destruye la infraestructura Azure (failback)
# =============================================================================
# IMPORTANTE: requiere confirmación explícita escribiendo "destroy" en el
# input para evitar destrucciones accidentales.
#
# El Blob Storage NO se toca: contiene los backups y el state de Terraform,
# que deben persistir entre failovers.
# =============================================================================

name: Destroy Pilot Light

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "destroy" para confirmar'
        required: true
        default: ''

env:
  TF_DIR: terraform/azure-pilot

jobs:
  destroy:
    name: terraform destroy (Azure pilot)
    runs-on: ubuntu-latest

    steps:
      - name: Validar confirmación
        if: inputs.confirm != 'destroy'
        run: |
          echo "ERROR: Debes escribir 'destroy' en el input para confirmar"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Terraform Init (backend Azure)
        working-directory: ${{ env.TF_DIR }}
        env:
          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          terraform init

      - name: Terraform Destroy
        working-directory: ${{ env.TF_DIR }}
        env:
          ARM_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          terraform destroy -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="vm_admin_password=${{ secrets.VM_ADMIN_PASSWORD }}"

      - name: Resumen
        run: |
          echo "============================================"
          echo "PILOT LIGHT DESTRUIDO"
          echo ""
          echo "El Storage Account NO se ha tocado:"
          echo "  - Contenedor db-backups: backups conservados"
          echo "  - Contenedor tfstate:    estado de Terraform conservado"
          echo "============================================"
